<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tư vấn của tôi</title>

    <!-- BOOTSTRAP -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />

    <!-- FONT AWESOME -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/home.css}" />

    <link rel="stylesheet" th:href="@{/css/login.css}" />

    <link rel="stylesheet" th:href="@{/css/footer.css}" />

    <link rel="stylesheet" th:href="@{/css/popup-cart.css}" />
  </head>

  <body>
    <!-- HEADER -->
    <div th:replace="fragments/header :: header"></div>

    <!-- CONTENT -->
    <div class="container py-5">
      <!-- TITLE -->
      <h3 class="fw-bold mb-4">
        <i class="fa fa-headset"></i>

        Các yêu cầu tư vấn đã gửi
      </h3>

      <!-- CARD -->
      <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-0">
          <table class="table table-hover align-middle mb-0">
            <!-- HEAD -->
            <thead class="table-light">
              <tr>
                <th>Ngày gửi</th>

                <th>Nội dung</th>

                <th>Trạng thái</th>

                <th>Phản hồi</th>
              </tr>
            </thead>

            <!-- BODY -->
            <tbody>
              <tr th:each="t : ${tuVanList}">
                <!-- NGÀY -->
                <td
                  th:text="${#temporals.format(
                        t.ngayGui,
                        'dd/MM/yyyy HH:mm'
                    )}"
                ></td>

                <!-- NỘI DUNG -->
                <td th:text="${t.noiDung}"></td>

                <!-- TRẠNG THÁI -->
                <td>
                  <span
                    th:if="${t.trangThai == 'Chờ tư vấn'}"
                    class="badge bg-warning text-dark"
                  >
                    Chờ xử lý
                  </span>

                  <span
                    th:if="${t.trangThai != 'Chờ tư vấn'}"
                    class="badge bg-success"
                  >
                    Đã tư vấn
                  </span>
                </td>

                <!-- PHẢN HỒI -->
                <td>
                  <div
                    th:if="${t.phanHoiCuaAdmin != null
                        && !#strings.isEmpty(t.phanHoiCuaAdmin)}"
                    class="text-success fw-semibold"
                  >
                    <span th:text="${t.phanHoiCuaAdmin}"></span>
                  </div>

                  <span
                    th:if="${t.phanHoiCuaAdmin == null
                        || #strings.isEmpty(t.phanHoiCuaAdmin)}"
                    class="text-muted"
                  >
                    Chưa có phản hồi
                  </span>
                </td>
              </tr>

              <!-- EMPTY -->
              <tr th:if="${#lists.isEmpty(tuVanList)}">
                <td colspan="4" class="text-center text-muted py-4">
                  Bạn chưa gửi yêu cầu tư vấn nào
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <div th:replace="fragments/footer :: footer"></div>
  </body>
</html>
