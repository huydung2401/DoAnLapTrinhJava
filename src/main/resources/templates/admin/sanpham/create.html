<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/fragments/admin-layout :: layout('Thêm Sản Phẩm Mới', ~{::#main-content})}">
<body>
    <div id="main-content">
        <div class="row">
            <div class="col-md-8 mx-auto">
                <div class="admin-card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h4 class="card-title mb-0">Nhập Thông Tin Sản Phẩm</h4>
                        <a th:href="@{/admin/sanpham}" class="btn btn-sm btn-secondary">
                            <i class="fas fa-arrow-left"></i> Quay lại
                        </a>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/admin/sanpham/create}" method="post" enctype="multipart/form-data" th:object="${sanPham}">
                            
                            <div class="row mb-3">
                                <div class="col-md-8">
                                    <label class="form-label fw-bold">Tên sản phẩm <span class="text-danger">*</span></label>
                                    <input type="text" th:field="*{tenSanPham}" class="form-control" placeholder="Nhập tên sản phẩm..." required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">Danh mục <span class="text-danger">*</span></label>
                                    <select th:field="*{danhMuc.idDanhMuc}" class="form-select" required>
                                        <option value="">-- Chọn danh mục --</option>
                                        <option th:each="dm : ${listDM}" th:value="${dm.idDanhMuc}" th:text="${dm.tenDanhMuc}"></option>
                                    </select>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">Giá bán (VNĐ) <span class="text-danger">*</span></label>
                                    <input type="number" th:field="*{gia}" class="form-control" placeholder="Ví dụ: 35000" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">Giá khuyến mãi (VNĐ)</label>
                                    <input type="number" th:field="*{giaKhuyenMai}" class="form-control" placeholder="Nếu không có thì để trống">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">Tồn kho ban đầu</label>
                                    <input type="number" th:field="*{soLuongTon}" class="form-control" value="0">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Hình ảnh sản phẩm</label>
                                <input class="form-control" type="file" name="fileImage" accept="image/*">
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Mô tả ngắn</label>
                                <textarea th:field="*{moTaNgan}" class="form-control" rows="2" placeholder="Nhập mô tả ngắn..."></textarea>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Mô tả chi tiết</label>
                                <textarea th:field="*{moTaChiTiet}" class="form-control" rows="4" placeholder="Nhập mô tả chi tiết..."></textarea>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold d-block">Trạng thái & Gắn cờ</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" th:field="*{trangThai}">
                                    <label class="form-check-label">Đang bán</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" th:field="*{laNoiBat}">
                                    <label class="form-check-label">Nổi bật</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" th:field="*{laBanChay}">
                                    <label class="form-check-label">Bán chạy</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" th:field="*{laSanPhamMoi}">
                                    <label class="form-check-label">Sản phẩm mới</label>
                                </div>
                            </div>

                            <hr>
                            
                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{/admin/sanpham}" class="btn btn-light">Hủy bỏ</a>
                                <button type="submit" class="btn btn-primary-admin">
                                    <i class="fas fa-save"></i> Lưu Sản Phẩm
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
