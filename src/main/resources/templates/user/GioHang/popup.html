<div id="cartOverlay" class="cart-overlay" onclick="closeCart()"></div>

<div id="cartSidebar" class="cart-sidebar">
    
    <div th:fragment="popupCart">
        
        <div class="cart-popup">
            <!-- GIỎ HÀNG TRỐNG -->
            
            <div th:if="${gioHang == null or #lists.isEmpty(gioHang.chiTietGioHangs)}">
                <p>Giỏ hàng trống.</p>
                
                <a th:href="@{/}" class="btn btn-primary w-100 mt-3">
                    Tiếp tục mua sắm
                </a>
            </div>
            
            <!-- CÓ SẢN PHẨM -->
            
            <div th:unless="${gioHang == null or #lists.isEmpty(gioHang.chiTietGioHangs)}">
                <div th:each="item : ${gioHang.chiTietGioHangs}" class="cart-item">
                    <div class="cart-item-img-wrapper">
                        <img th:src="@{${item.sanPham.hinhAnh}}"/>
                    </div>
                    
                    <div class="cart-item-info">
                        <div class="product-name" th:text="${item.sanPham.tenSanPham}"></div>
                        
                        <!-- SIZE -->
                        
                        <div class="product-meta">
                            Size:
                            <span th:text="${item.sizeSanPham.tenSize}"></span>
                        </div>
                        
                        <div th:if="${item.toppings != null and !#lists.isEmpty(item.toppings)}">
                            <div class="product-meta meta-topping" style="display: block; margin-top: 2px">
                                <b>Topping:</b>
                                <th:block th:each="tp, iterStat : ${item.toppings}">
                                    <span th:if="${tp.topping != null}" th:text="${tp.topping.tenTopping}"></span>
                                    
                                    <span th:if="${tp.topping == null}" th:text="${tp.tenTopping}"></span>
                                    
                                    <span th:if="${!iterStat.last}">, </span>
                                </th:block>
                            </div>
                        </div>
                        <!-- GHI CHÚ -->
                        
                        <div th:if="${item.ghiChu != null and item.ghiChu != ''}">
                            <small class="text-info">
                                Ghi chú:
                                <span th:text="${item.ghiChu}"></span>
                            </small>
                        </div>
                        <div class="product-price"
                             th:text="${#numbers.formatDecimal(item.thanhTien,0,'COMMA',0,'POINT')} + ' đ'"></div>
                        <div class="quantity-box">
                            <button type="button" class="qty-btn"
                                    th:onclick="'giamSoLuong(' + ${item.idChiTietGioHang} + ', this)'">
                                -
                            </button>
                            
                            <span class="qty" th:text="${item.soLuong}"> </span>
                            
                            <button type="button" class="qty-btn"
                                    th:onclick="'tangSoLuong(' + ${item.idChiTietGioHang} + ', this)'">
                                +
                            </button>
                        </div>
                    </div>
                    <!-- XÓA -->
                    
                    <a href="javascript:void(0);" th:onclick="'xoaSanPhamPopupAjax(' + ${item.idChiTietGioHang} + ')'"
                       class="remove-btn" title="Xóa sản phẩm">
                        <i class="fa-solid fa-xmark"></i>
                    </a>
                </div>
                
                <!-- TỔNG -->
                
                <div class="cart-summary-box">
                    <div class="summary-line">
                        <span class="label"> Tổng tiền </span>
                        <span class="value" id="tongTienPopup"
                              th:text="${#numbers.formatDecimal(tongTien,0,'COMMA',0,'POINT')} + ' đ'">
          </span>
                    </div>
                </div>
                
                <!-- BUTTON -->
                
                <div class="cart-action-footers">
                    <a th:href="@{/GioHang}" class="btn-view-cart">
                        <i class="fa-solid fa-cart-shopping"></i>
                        Xem giỏ hàng
                    </a>
                    <a th:href="@{/GioHang/ThanhToan}" class="btn-checkout">
                        <i class="fa-solid fa-wallet"></i>
                        Thanh toán
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
