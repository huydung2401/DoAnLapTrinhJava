<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | Cafe Admin'">Admin Panel</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Admin CSS -->
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

    <div class="admin-wrapper">
        <!-- SIDEBAR -->
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h3>Cafe<span>Admin</span></h3>
            </div>
            
            <div class="sidebar-menu">
                <a th:href="@{/admin/dashboard}" class="menu-item" id="menu-dashboard">
                    <i class="fas fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
                
                <a th:href="@{/admin/sanpham}" class="menu-item" id="menu-sanpham">
                    <i class="fas fa-coffee"></i>
                    <span>Quản lý Sản phẩm</span>
                </a>
                
                <a th:href="@{/admin/nhapkho}" class="menu-item" id="menu-nhapkho">
                    <i class="fas fa-boxes"></i>
                    <span>Quản lý Nhập kho</span>
                </a>
                
                <a th:href="@{/admin/khuyenmai}" class="menu-item" id="menu-khuyenmai">
                    <i class="fas fa-tags"></i>
                    <span>Quản lý Khuyến mãi</span>
                </a>
                
                <a th:href="@{/admin/danhgia}" class="menu-item" id="menu-danhgia">
                    <i class="fas fa-star"></i>
                    <span>Quản lý Đánh giá</span>
                </a>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="admin-main">
            <!-- HEADER -->
            <header class="admin-header">
                <h2 class="header-title" th:text="${title}">Dashboard</h2>
                
                <div class="header-user">
                    <div class="user-info">
                        <!-- Tạm thời hardcode, sẽ thay bằng session.User sau -->
                        <span class="user-name">Administrator</span>
                        <span class="user-role">Quản trị viên</span>
                    </div>
                    <a th:href="@{/TaiKhoan/DangXuat}" class="btn-logout">
                        <i class="fas fa-sign-out-alt"></i> Đăng xuất
                    </a>
                </div>
            </header>

            <!-- DYNAMIC CONTENT -->
            <div class="admin-content">
                <div th:replace="${content}"></div>
            </div>
        </main>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js (Will be used in Dashboard) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // Tự động thêm class active cho menu dựa trên URL hiện tại
        document.addEventListener('DOMContentLoaded', function() {
            var path = window.location.pathname;
            if(path.includes('/admin/dashboard')) document.getElementById('menu-dashboard').classList.add('active');
            else if(path.includes('/admin/sanpham')) document.getElementById('menu-sanpham').classList.add('active');
            else if(path.includes('/admin/nhapkho')) document.getElementById('menu-nhapkho').classList.add('active');
            else if(path.includes('/admin/khuyenmai')) document.getElementById('menu-khuyenmai').classList.add('active');
            else if(path.includes('/admin/danhgia')) document.getElementById('menu-danhgia').classList.add('active');
        });
    </script>
</body>
</html>
