<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin-layout}">

<head>
    <title>Quản lý khuyến mãi</title>
</head>

<body>

<div layout:fragment="content">
    
    <h4 class="fw-bold text-primary mb-3">
        QUẢN LÝ MÃ KHUYẾN MÃI </h4>
    
    <div th:if="${message}" class="alert alert-info" th:text="${message}"></div>
    
    <!-- FORM -->
    <div class="card p-4 mb-4 shadow-sm">
        
        <h5 class="mb-3 border-bottom pb-2">
            Tạo mã mới </h5>
        
        <form id="voucherForm" th:action="@{/admin/khuyenmai/tao-ma}" method="post" class="row g-3">
            
            <div class="col-md-3">
                <label>Mã Code</label>
                <input name="maCode" class="form-control" placeholder="VD: SALE10" required>
            </div>
            
            <div class="col-md-3">
                <label>Giá trị giảm</label>
                <input name="giaTriGiam" type="number" class="form-control" required>
            </div>
            
            <div class="col-md-3">
                <label>Loại giảm</label>
                <select name="loaiGiamGia" class="form-control">
                    
                    <option value="TIEN_MAT">
                        Tiền mặt
                    </option>
                    
                    <option value="PHAN_TRAM">
                        Phần trăm
                    </option>
                
                </select>
            </div>
            
            <div class="col-md-3">
                <label>Số lượng</label>
                <input name="soLuong" type="number" value="100" class="form-control">
            </div>
            
            <div class="col-md-3">
                <label>Ngày bắt đầu</label>
                <input type="datetime-local" name="ngayBatDau" class="form-control">
            </div>
            
            <div class="col-md-3">
                <label>Ngày kết thúc</label>
                <input type="datetime-local" name="ngayKetThuc" class="form-control">
            </div>
            
            <div class="col-12 text-end">
                <button type="submit" class="btn btn-success">
                    <i class="fa fa-plus"></i>
                    Tạo mã
                </button>
            </div>
        
        </form>
    
    </div>
    
    <!-- TABLE -->
    <table class="table table-bordered bg-white">
        
        <thead class="table-light">
        <tr>
            <th>Code</th>
            <th>Giảm</th>
            <th>Số lượng</th>
            <th>Thời gian</th>
            <th>Xóa</th>
        </tr>
        </thead>
        
        <tbody>
        
        <tr th:each="item : ${listMa}">
            
            <!-- Mã code -->
            <td class="fw-bold text-danger" th:text="${item.maCode}"></td>
            
            <!-- Giá trị giảm -->
            <td>
                <span th:text="${#numbers.formatDecimal(item.giaTriGiam, 0, 'COMMA', 0, 'POINT')}"></span>
                <span th:text="${item.loaiGiamGia.name() == 'PHAN_TRAM' ? '%' : ' đ'}"></span>
            </td>
            
            <!-- Số lượng -->
            <td>
                <span th:text="${item.daSuDung}"></span>
                /
                <span th:text="${item.soLuong}"></span>
            </td>
            
            <!-- Thời gian -->
            <td>
                <small>
                    Từ:
                    <span th:text="${#temporals.format(item.ngayBatDau,'dd/MM/yyyy')}"></span>
                </small>
                <br>
                
                <small>
                    Đến:
                    <span th:text="${#temporals.format(item.ngayKetThuc,'dd/MM/yyyy')}"></span>
                </small>
            </td>
            
            <!-- Xóa -->
            <td>
                <a th:href="@{'/admin/khuyenmai/xoa-ma/' + ${item.idMaGiamGia}}" class="btn btn-danger btn-sm"
                   onclick="return confirm('Xóa mã này?')">
                    <i class="fa fa-trash"></i>
                </a>
            </td>
        
        </tr>
        
        </tbody>
    
    </table>
    <script>
        
        document.addEventListener("DOMContentLoaded", () => {
            
            const form = document.getElementById("voucherForm");
            
            if (!form) return;
            
            form.addEventListener("submit", function (e) {
                
                e.preventDefault();
                
                const data = new FormData(form);
                
                fetch(form.action, {
                    method: "POST",
                    body: data
                })
                        .then(res => res.json())
                        .then(res => {
                            
                            if (!res.success) {
                                alert(res.message);
                                return;
                            }
                            
                            const tbody = document.querySelector("table tbody");
                            
                            const tr = document.createElement("tr");
                            
                            tr.innerHTML = `
                <td class="fw-bold text-danger">
                    ${res.maCode}
                </td>

                <td>
                    ${res.giaTriGiam}
                    ${res.loaiGiamGia === 'PHAN_TRAM' ? '%' : 'đ'}
                </td>

                <td>
                    0/${res.soLuong}
                </td>

                <td>
                    <small>Từ: ${res.ngayBatDau ?? ''}</small><br>
                    <small>Đến: ${res.ngayKetThuc ?? ''}</small>
                </td>

                <td>
                    <a href="/admin/khuyenmai/xoa-ma/${res.idMaGiamGia}"
                       class="btn btn-danger btn-sm">

                       <i class="fa fa-trash"></i>

                    </a>
                </td>
            `;
                            
                            tbody.prepend(tr);
                            
                            form.reset();
                            
                        })
                        .catch(err => {
                            
                            console.error(err);
                            alert("Có lỗi xảy ra.");
                            
                        });
                
            });
            
        });
    
    </script>
</div>


</body>
</html>
