<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng của bạn</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="container mt-5">

    <h2 class="fw-bold text-center mb-4">
        GIỎ HÀNG CỦA BẠN
    </h2>

    <!-- GIỎ HÀNG TRỐNG -->

    <div th:if="${gioHang == null or #lists.isEmpty(gioHang.chiTietGioHangs)}"
         class="text-center py-5">

        <h4>Giỏ hàng của bạn đang trống</h4>

        <a th:href="@{/}"
           class="btn btn-primary mt-3">

            Tiếp tục mua sắm

        </a>

    </div>

    <!-- CÓ SẢN PHẨM -->

    <div th:unless="${gioHang == null or #lists.isEmpty(gioHang.chiTietGioHangs)}">

        <div class="row">

            <!-- LEFT -->

            <div class="col-md-8">

                <div th:each="item : ${gioHang.chiTietGioHangs}"
                     class="card shadow-sm mb-3">

                    <div class="card-body d-flex align-items-center">

                        <!-- ẢNH -->

                        <img th:src="@{${item.sanPham.hinhAnh}}"
                             width="120"
                             height="120"
                             style="object-fit: cover"
                             class="rounded me-3">

                        <!-- INFO -->

                        <div class="flex-grow-1">

                            <h5 class="fw-bold"
                                th:text="${item.sanPham.tenSanPham}">
                            </h5>

                            <div class="text-danger fw-bold mb-2"
                                 th:text="${#numbers.formatDecimal(item.thanhTien,0,'COMMA',0,'POINT')} + ' đ'">
                            </div>

                            <div class="d-flex align-items-center">

                                <a th:href="@{/GioHang/Giam/{id}(id=${item.idChiTietGioHang})}"
                                   class="btn btn-outline-secondary btn-sm">

                                    -

                                </a>

                                <input type="text"
                                       class="form-control text-center mx-2"
                                       style="width:70px"
                                       th:value="${item.soLuong}"
                                       readonly>

                                <a th:href="@{/GioHang/Tang/{id}(id=${item.idChiTietGioHang})}"
                                   class="btn btn-outline-secondary btn-sm">

                                    +

                                </a>

                            </div>

                        </div>

                        <!-- XÓA -->

                        <a th:href="@{/GioHang/Xoa/{id}(id=${item.idChiTietGioHang})}"
                           class="btn btn-danger">

                            <i class="fa fa-trash"></i>

                        </a>

                    </div>

                </div>

            </div>

            <!-- RIGHT -->

            <div class="col-md-4">

                <div class="card shadow">

                    <div class="card-body">

                        <h4 class="fw-bold mb-3">
                            THÔNG TIN ĐƠN HÀNG
                        </h4>

                        <div class="d-flex justify-content-between">

                            <span>Tổng tiền:</span>

                            <span class="fw-bold text-danger">

                                <span th:text="${#numbers.formatDecimal(
                                    gioHang.chiTietGioHangs.![thanhTien].stream().reduce(0.0, (a,b)->a+b),
                                    0,'COMMA',0,'POINT')}">
                                </span> đ

                            </span>

                        </div>

                        <a href="#"
                           class="btn btn-danger w-100 mt-4">

                            THANH TOÁN

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
