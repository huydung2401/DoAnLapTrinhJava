<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin-layout}">
<head>
    <title>Quản lý Đánh Giá</title>
</head>
<body>
<div layout:fragment="content">
    <div class="admin-card">
        <div class="card-header">
            <h4 class="card-title">Quản Lý Đánh Giá</h4>
        </div>
        <div class="card-body">
            <form th:action="@{/admin/danhgia}" method="get" class="row g-2 mb-4 align-items-end">
                <div class="col-md-3">
                    <label class="form-label">Mã sản phẩm</label>
                    <input type="text" name="maSP" class="form-control" th:value="${maSP}" placeholder="VD: SP01"/>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Số sao</label>
                    <select name="soSao" class="form-select">
                        <option value="">-- Tất cả --</option>
                        <option th:each="i : ${#numbers.sequence(5, 1)}" th:value="${i}" th:selected="${soSao == i}"
                                th:text="${i} + ' sao'"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Trạng thái</label>
                    <select name="status" class="form-select">
                        <option value="">-- Tất cả --</option>
                        <option value="1" th:selected="${status == 1}">Đã duyệt</option>
                        <option value="0" th:selected="${status == 0}">Chờ duyệt</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100"><i class="fas fa-filter"></i> Lọc</button>
                </div>
                <div class="col-md-1">
                    <a th:href="@{/admin/danhgia}" class="btn btn-outline-secondary w-100"><i class="fas fa-times"></i></a>
                </div>
            </form>
            
            <div class="row">
                
                <div class="col-12" th:each="dg : ${listDanhGia}" th:id="'review-item-' + ${dg.idDanhGia}">
                    
                    <div class="card shadow-sm border-0 mb-4">
                        
                        <div class="card-body">
                            
                            <div class="d-flex justify-content-between">
                                
                                <div>
                                    
                                    <h5 class="fw-bold" th:text="${dg.nguoiDung.hoTen}"></h5>
                                    
                                    <small class="text-muted"
                                           th:text="${#temporals.format(dg.ngayDanhGia,'dd/MM/yyyy HH:mm')}">
                                    </small>
                                
                                </div>
                                
                                <div>

                        <span class="badge bg-warning text-dark fs-6">
                            ⭐ <span th:text="${dg.soSao}"></span>/5
                        </span>
                                
                                </div>
                            
                            </div>
                            
                            <hr>
                            
                            <p>
                                <strong>Mã SP:</strong>
                                <span th:text="${dg.sanPham.idSanPham}"></span>
                            </p>
                            
                            <p>
                                <strong>Sản phẩm:</strong>
                                <span th:text="${dg.sanPham.tenSanPham}"></span>
                            </p>
                            
                            <p th:text="${dg.noiDung}"></p>
                            
                            <div th:if="${dg.hinhAnh != null and !#strings.isEmpty(dg.hinhAnh)}" class="mb-3">
                                
                                <a th:href="${dg.hinhAnh}" target="_blank">
                                    
                                    <img th:src="${dg.hinhAnh}" alt="Ảnh đánh giá" style="width:120px;
                                        height:120px;
                                        object-fit:cover;
                                        border-radius:10px;
                                        border:1px solid #ddd;">
                                
                                </a>
                            
                            </div>
                            
                            <div class="d-flex gap-2">
                                
                                <button th:if="${!dg.daDuyet}" class="btn btn-success btn-sm"
                                        th:onclick="'updateStatus(' + ${dg.idDanhGia} + ', true)'">
                                    
                                    <i class="fas fa-check"></i>
                                    Duyệt
                                
                                </button>
                                
                                <button th:if="${dg.daDuyet}" class="btn btn-warning btn-sm"
                                        th:onclick="'updateStatus(' + ${dg.idDanhGia} + ', false)'">
                                    
                                    <i class="fas fa-eye-slash"></i>
                                    Ẩn
                                
                                </button>
                                
                                <button class="btn btn-danger btn-sm"
                                        th:onclick="'deleteReview(' + ${dg.idDanhGia} + ')'">
                                    
                                    <i class="fas fa-trash"></i>
                                    Xóa
                                
                                </button>
                            
                            </div>
                        
                        </div>
                    
                    </div>
                
                </div>
            
            </div>
        </div>
    </div>
    
    <script>
        function updateStatus(id, trangThai) {
            if (
                    trangThai &&
                    !confirm("Bạn muốn duyệt hiển thị đánh giá này trên trang chủ?")
            )
                return;
            if (
                    !trangThai &&
                    !confirm("Bạn muốn ẩn đánh giá này khỏi trang chủ?")
            )
                return;
            
            fetch("/admin/danhgia/update-status/" + id, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({trangThai: trangThai}),
            })
                    .then((response) => {
                        if (response.ok) {
                            // Reload trang để render lại các nút (cho đơn giản)
                            window.location.reload();
                        } else {
                            alert("Có lỗi xảy ra, vui lòng thử lại!");
                        }
                    })
                    .catch((err) => console.error(err));
        }
        
        function sendReply(id) {
            const noiDung = document.getElementById("reply-input-" + id).value;
            if (!noiDung.trim()) {
                alert("Vui lòng nhập nội dung phản hồi!");
                return;
            }
            
            fetch("/admin/danhgia/reply/" + id, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({noiDungPhanHoi: noiDung}),
            })
                    .then((response) => {
                        if (response.ok) {
                            alert("Đã gửi phản hồi!");
                            // Hiển thị trực tiếp vào giao diện
                            document.getElementById("admin-reply-text-" + id).innerText =
                                    noiDung;
                            document.getElementById("admin-reply-box-" + id).style.display =
                                    "block";
                            
                            // Đóng form
                            const collapseEl = document.getElementById("reply-form-" + id);
                            const bsCollapse =
                                    bootstrap.Collapse.getInstance(collapseEl) ||
                                    new bootstrap.Collapse(collapseEl, {toggle: false});
                            bsCollapse.hide();
                        } else {
                            alert("Lỗi khi gửi phản hồi!");
                        }
                    })
                    .catch((err) => console.error(err));
        }
        
        function deleteReview(id) {
            if (
                    !confirm(
                            "CẢNH BÁO: Đánh giá sẽ bị xóa vĩnh viễn khỏi Database. Bạn có chắc chắn không?",
                    )
            )
                return;
            
            fetch("/admin/danhgia/delete/" + id, {
                method: "POST",
            })
                    .then((response) => {
                        if (response.ok) {
                            alert("Đã xóa vĩnh viễn đánh giá thành công!");
                            // Xóa element khỏi màn hình
                            const el = document.getElementById("review-item-" + id);
                            if (el) el.remove();
                        } else {
                            alert("Có lỗi xảy ra khi xóa.");
                        }
                    })
                    .catch((err) => console.error(err));
        }
    </script>
</div>
</body>
</html>
