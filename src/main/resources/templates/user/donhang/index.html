<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Đơn hàng của tôi</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/logIn.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/popup-cart.css}">

</head>

<body>
<div th:replace="~{fragments/header :: header}"></div>
<div class="container py-5">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        
        <h3 class="fw-bold mb-0">
            <i class="fa-solid fa-cart-shopping"></i>
            Đơn hàng của tôi </h3>
        
        <a th:href="@{/home}" class="btn btn-outline-secondary">
            <i class="fa fa-arrow-left"></i>
            Quay lại
        </a>
    
    </div>
    
    <div class="card shadow-sm">
        
        <div class="card-body p-0">
            
            <table class="table table-hover mb-0">
                
                <thead class="table-light">
                
                <tr>
                    <th>Mã đơn hàng</th>
                    <th>Ngày đặt</th>
                    <th>Tổng tiền</th>
                    <th>Thanh toán</th>
                    <th>Trạng thái</th>
                    <th class="text-center">Thao tác</th>
                </tr>
                
                </thead>
                
                <tbody>
                
                <tr th:if="${#lists.isEmpty(danhSach)}">
                    
                    <td colspan="6" class="text-center py-4">
                        
                        Bạn chưa có đơn hàng nào
                    
                    </td>
                
                </tr>
                
                <tr th:each="dh : ${danhSach}">
                    
                    <td>
                        
                        <strong>#</strong>
                        
                        <span th:text="${dh.idDonHang}">
                        </span>
                    
                    </td>
                    
                    <td th:text="${#temporals.format(
                        dh.ngayDat,
                        'dd/MM/yyyy HH:mm'
                    )}"></td>
                    
                    <td class="text-danger fw-bold">

                        <span th:text="${#numbers.formatDecimal(
                            dh.tongTien,
                            0,
                            'COMMA',
                            0,
                            'POINT'
                        )}">
                        </span> đ
                    
                    </td>
                    
                    <td>

                        <span th:text="${dh.phuongThucThanhToan}">
                        </span>
                    
                    </td>
                    
                    <td>
                        
                        <!-- Chờ thanh toán -->
                        <span class="badge bg-warning text-dark" th:if="${dh.trangThai == 'CHO_THANH_TOAN'}">

                            Chờ thanh toán

                        </span>
                        
                        <!-- Chờ xác nhận -->
                        <span class="badge bg-info" th:if="${dh.trangThai == 'CHO_XAC_NHAN'}">

                            Chờ xác nhận

                        </span>
                        
                        <!-- Đã thanh toán -->
                        <span class="badge bg-success" th:if="${dh.trangThai == 'DA_THANH_TOAN'}">

                            Đã thanh toán

                        </span>
                        
                        <!-- Đang giao -->
                        <span class="badge bg-primary" th:if="${dh.trangThai == 'DANG_GIAO'}">

                            Đang giao

                        </span>
                        
                        <!-- Hoàn thành -->
                        <span class="badge bg-success" th:if="${dh.trangThai == 'HOAN_THANH'}">

                            Hoàn thành

                        </span>
                        
                        <!-- Hủy -->
                        <span class="badge bg-danger" th:if="${dh.trangThai == 'DA_HUY'}">

                            Đã hủy

                        </span>
                    
                    </td>
                    
                    <td class="text-center">
                        
                        <a th:href="@{/DonHang/XemHoaDon/{id}
                        (id=${dh.idDonHang})}"
                           
                           class="btn btn-sm btn-outline-primary">
                            
                            <i class="fa fa-eye"></i>
                            Xem
                        
                        </a>
                    
                    </td>
                
                </tr>
                
                </tbody>
            
            </table>
        
        </div>
    
    </div>

</div>
<script th:src="@{/js/header.js}"></script>
<!-- FOOTER -->
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
