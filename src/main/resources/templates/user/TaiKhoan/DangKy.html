<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Tạo tài khoản</title>

    <!-- BOOTSTRAP -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <!-- FONT AWESOME -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet"
          th:href="@{/css/home.css}">

    <link rel="stylesheet"
          th:href="@{/css/login.css}">

    <link rel="stylesheet"
          th:href="@{/css/footer.css}">


    <style>

        body{
            background: #f5f5f5;
            font-family: 'Segoe UI', sans-serif;
        }

        /* WRAP */

        .register-wrap{
            display: flex;

            justify-content: space-between;

            align-items: flex-start;

            max-width: 1200px;

            margin: 0 auto;

            padding: 60px 0;

            gap: 80px;
        }

        /* LEFT */

        .register-left{
            flex: 1;
        }

        .reg-title{
            font-size: 48px;

            font-weight: 700;

            color: #222;
        }

        .reg-desc{
            margin-top: 10px;

            font-size: 18px;

            color: #666;

            max-width: 420px;
        }

        .reg-line{
            width: 55px;

            height: 4px;

            background: #000;

            margin-top: 18px;
        }

        /* RIGHT */

        .register-right{
            flex: 1;
        }

        .register-box{
            background: white;

            padding: 35px;

            border-radius: 12px;

            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        /* INPUT */

        .input-box{
            width: 100%;

            padding: 15px;

            border-radius: 6px;

            border: 1px solid #ddd;

            background: #efefef;

            margin-bottom: 16px;

            font-size: 16px;

            outline: none;
        }

        .input-box:focus{
            border-color: #006241;

            background: white;
        }

        /* METHOD */

        .reg-method{
            display: flex;

            gap: 35px;

            margin-bottom: 20px;

            font-size: 16px;
        }

        /* GENDER */

        .gender-group{
            display: flex;

            gap: 28px;

            margin-bottom: 18px;
        }

        /* BUTTON */

        .btn-register{
            width: 100%;

            padding: 14px 0;

            border: none;

            border-radius: 6px;

            background: #2d2d2d;

            color: white;

            font-size: 17px;

            font-weight: 600;

            transition: 0.3s;
        }

        .btn-register:hover{
            background: #000;
        }

        /* NOTE */

        .captcha-note{
            font-size: 14px;

            color: #777;

            margin-bottom: 15px;
        }

        /* BACK */

        .back-home{
            display: inline-block;

            margin-top: 18px;

            color: #2d2d2d;

            font-size: 16px;
        }

        /* SOCIAL */

        .social-login{
            display: flex;

            gap: 10px;

            margin-top: 20px;
        }

        .btn-google{
            background: #db4437;

            color: white;

            border: none;

            padding: 10px 18px;

            border-radius: 6px;
        }

        .btn-facebook{
            background: #4267B2;

            color: white;

            border: none;

            padding: 10px 18px;

            border-radius: 6px;
        }

        /* ERROR */

        .alert{
            border-radius: 10px;
        }

        /* MOBILE */

        @media(max-width:992px){

            .register-wrap{
                flex-direction: column;

                padding: 40px 20px;

                gap: 40px;
            }

        }

    </style>

</head>

<body>

<!-- HEADER -->
<div th:replace="fragments/header :: header"></div>

<div class="container">

    <div class="register-wrap">

        <!-- LEFT -->

        <div class="register-left">

            <h1 class="reg-title">
                Tạo tài khoản
            </h1>

            <p class="reg-desc">
                Đăng ký tài khoản chỉ trong 1 phút để đặt đồ uống,
                theo dõi đơn hàng và nhận ưu đãi hấp dẫn từ STARBUCH.
            </p>

            <div class="reg-line"></div>

        </div>

        <!-- RIGHT -->

        <div class="register-right">

            <div class="register-box">

                <!-- ERROR -->

                <div th:if="${error}"
                     class="alert alert-danger">

                    <span th:text="${error}"></span>

                </div>

                <!-- FORM -->

                <form th:action="@{/TaiKhoan/DangKy}"
                      method="post">

                    <!-- METHOD -->

                    <div class="reg-method">

                        <label>
                            <input type="radio"
                                   name="type"
                                   value="email"
                                   checked>

                            Đăng ký bằng email
                        </label>

                        <label>
                            <input type="radio"
                                   name="type"
                                   value="phone">

                            Đăng ký bằng số điện thoại
                        </label>

                    </div>

                    <!-- HỌ -->

                    <input type="text"
                           id="Ho"
                           class="input-box"
                           placeholder="Họ"
                           required>

                    <!-- TÊN -->

                    <input type="text"
                           id="Ten"
                           class="input-box"
                           placeholder="Tên"
                           required>

                    <!-- GENDER -->

                    <div class="gender-group">

                        <label>
                            <input type="radio"
                                   name="gioiTinh"
                                   value="Nữ">

                            Nữ
                        </label>

                        <label>
                            <input type="radio"
                                   name="gioiTinh"
                                   value="Nam">

                            Nam
                        </label>

                    </div>

                    <!-- HỌ TÊN -->

                    <input type="hidden"
                           name="hoTen"
                           id="HoTen">

                    <!-- EMAIL -->

                    <input type="email"
                           name="email"
                           class="input-box reg-email"
                           placeholder="Email"
                           required>

                    <!-- PHONE -->

                    <input type="text"
                           name="soDienThoai"
                           class="input-box reg-phone"
                           placeholder="Số điện thoại"
                           style="display:none;">

                    <!-- PASSWORD -->

                    <input type="password"
                           name="matKhau"
                           class="input-box"
                           placeholder="Mật khẩu"
                           required>

                    <!-- CAPTCHA -->

                    <p class="captcha-note">

                        Website được bảo vệ bởi reCAPTCHA và
                        <a href="#">Chính sách bảo mật</a>
                        cùng
                        <a href="#">Điều khoản dịch vụ</a>
                        của Google.

                    </p>

                    <!-- BUTTON -->

                    <button type="submit"
                            class="btn-register">

                        ĐĂNG KÝ

                    </button>

                </form>

                <!-- BACK -->

                <a th:href="@{/}"
                   class="back-home">

                    ← Quay lại trang chủ

                </a>

                <!-- SOCIAL -->

                <div class="social-login">

                    <button type="button"
                            class="btn-google">

                        <i class="fab fa-google"></i>
                        Google

                    </button>

                    <button type="button"
                            class="btn-facebook">

                        <i class="fab fa-facebook-f"></i>
                        Facebook

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- SCRIPT -->

<script>

    // GỘP HỌ TÊN

    document.querySelector(".btn-register")
        .addEventListener("click", function () {

            let ho =
                document.getElementById("Ho")
                    .value.trim();

            let ten =
                document.getElementById("Ten")
                    .value.trim();

            document.getElementById("HoTen").value =
                ho + " " + ten;

        });

    // EMAIL / PHONE

    document.querySelectorAll(
        "input[name='type']"
    ).forEach(r => {

        r.addEventListener("change", function () {

            if (this.value === "email") {

                document.querySelector(".reg-email")
                    .style.display = "block";

                document.querySelector(".reg-phone")
                    .style.display = "none";

            } else {

                document.querySelector(".reg-email")
                    .style.display = "none";

                document.querySelector(".reg-phone")
                    .style.display = "block";

            }

        });

    });

</script>
<!-- FOOTER -->
<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
