<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin-layout}">


<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .card-stat {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
        }
        
        .card-stat:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.15);
        }
        
        .icon-box {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 1.5rem;
        }
        
        .bg-soft-primary {
            background: #dbeafe;
            color: #2563eb;
        }
        
        .bg-soft-success {
            background: #dcfce7;
            color: #16a34a;
        }
        
        .bg-soft-danger {
            background: #fee2e2;
            color: #dc2626;
        }
        
        .bg-soft-warning {
            background: #fef3c7;
            color: #d97706;
        }
    </style>
</head>

<div layout:fragment="content">
    <div class="container-fluid py-4">
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <a th:href="@{/admin/sanpham}" class="card card-stat p-4 text-decoration-none text-dark">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-muted text-uppercase fw-bold small">Sản phẩm</h6>
                            <h3 class="fw-bold" th:text="${tongSanPham}">0</h3>
                            <small class="text-danger"><i class="fa fa-exclamation-circle"></i> <span
                                    th:text="${sanPhamSapHet}">0</span> sắp hết</small>
                        </div>
                        <div class="icon-box bg-soft-primary"><i class="fa fa-box"></i></div>
                    </div>
                </a>
            </div>
            <div class="col-md-3">
                <div class="card card-stat p-4">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-muted text-uppercase fw-bold small">Doanh thu</h6>
                            <h3 class="fw-bold text-success"
                                th:text="${#numbers.formatDecimal(tongDoanhThu, 0, 'POINT', 0, 'NONE')} + 'đ'">0đ</h3>
                            <small class="text-muted">Tổng tháng này</small>
                        </div>
                        <div class="icon-box bg-soft-success"><i class="fa fa-money-bill-wave"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <a th:href="@{/admin/donhang}" class="card card-stat p-4 text-decoration-none text-dark">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-muted text-uppercase fw-bold small">Đơn mới</h6>
                            <h3 class="fw-bold text-danger" th:text="${donHangMoi}">0</h3>
                            <small class="text-muted">Chờ xử lý</small>
                        </div>
                        <div class="icon-box bg-soft-danger"><i class="fa fa-shopping-cart"></i></div>
                    </div>
                </a>
            </div>
            <div class="col-md-3">
                <a th:href="@{/admin/khachhang}" class="card card-stat p-4 text-decoration-none text-dark">
                    
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-muted text-uppercase fw-bold small">Khách hàng</h6>
                            <h3 class="fw-bold" th:text="${tongKhachHang}">0</h3>
                            <small class="text-muted">Tổng lượt đăng ký</small>
                        </div>
                        
                        <div class="icon-box bg-soft-warning">
                            <i class="fa fa-users"></i>
                        </div>
                    </div>
                
                </a>
            </div>
        </div>
        
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white py-3 border-0">
                <h5 class="fw-bold mb-0"><i class="fa fa-history text-primary me-2"></i>Hoạt động gần đây</h5>
            </div>
            <div class="card-body">
                <div th:each="item : ${hoatDongGanDay}" class="d-flex align-items-center mb-3 border-bottom pb-2">
                    <div class="me-3"><i th:classappend="${item.icon}" class="fas text-secondary"></i></div>
                    <div>
                        <div class="fw-semibold" th:text="${item.noiDung}">Nội dung...</div>
                        <small class="text-muted"
                               th:text="${#temporals.format(item.thoiGian, 'HH:mm - dd/MM/yyyy')}"></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</html>
