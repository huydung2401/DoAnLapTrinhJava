<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />

    <title>Lịch sử yêu cầu tư vấn</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/home.css}" />

    <link rel="stylesheet" th:href="@{/css/login.css}" />

    <link rel="stylesheet" th:href="@{/css/footer.css}" />

    <link rel="stylesheet" th:href="@{/css/popup-cart.css}" />
  </head>

  <body>
    <!-- HEADER -->
    <div th:replace="fragments/header :: header"></div>

    <div class="container py-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold text-primary">
          <i class="fa fa-list-alt"></i>

          LỊCH SỬ PHIẾU TƯ VẤN
        </h4>

        <a th:href="@{/TuVan/Create}" class="btn btn-warning fw-bold">
          <i class="fa fa-plus-circle"></i>

          Gửi yêu cầu mới
        </a>
      </div>

      <!-- KHÔNG CÓ DỮ LIỆU -->

      <div th:if="${#lists.isEmpty(listPhieu)}">
        <div class="alert alert-info text-center py-4">
          <p class="mb-0">Bạn chưa có phiếu tư vấn nào.</p>
        </div>
      </div>

      <!-- CÓ DỮ LIỆU -->

      <div th:unless="${#lists.isEmpty(listPhieu)}">
        <table
          class="table table-hover table-bordered bg-white shadow-sm align-middle"
        >
          <thead class="table-light">
            <tr>
              <th>Mã phiếu</th>

              <th>Ngày gửi</th>

              <th>Nội dung yêu cầu</th>

              <th>Trạng thái</th>

              <th class="text-center">Hành động</th>
            </tr>
          </thead>

          <tbody>
            <tr th:each="item : ${listPhieu}">
              <!-- ID -->

              <td>
                <a
                  th:href="@{/TuVan/Details/{id}(id=${item.idTuVan})}"
                  class="fw-bold text-decoration-none text-primary"
                >
                  #<span th:text="${item.idTuVan}"></span>
                </a>
              </td>

              <!-- NGÀY -->

              <td>
                <span
                  th:text="${#temporals.format(item.ngayGui,'dd/MM/yyyy HH:mm')}"
                >
                </span>
              </td>

              <!-- NỘI DUNG -->

              <td>
                <span
                  class="text-muted small"
                  th:text="${item.noiDung != null ?
                                   #strings.abbreviate(item.noiDung,40)
                                   : ''}"
                >
                </span>
              </td>

              <!-- TRẠNG THÁI -->

              <td>
                <span
                  th:if="${item.trangThai == 'DA_PHAN_HOI'}"
                  class="badge bg-success"
                >
                  Đã trả lời
                </span>

                <span
                  th:if="${item.trangThai != 'DA_PHAN_HOI'}"
                  class="badge bg-warning text-dark"
                >
                  Chưa trả lời
                </span>
              </td>

              <!-- ACTION -->

              <td class="text-center">
                <a
                  th:href="@{/TuVan/Details/{id}(id=${item.idTuVan})}"
                  class="btn btn-sm btn-primary"
                >
                  <i class="fa fa-eye"></i>

                  Xem chi tiết
                </a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- FOOTER -->
    <div th:replace="fragments/footer :: footer"></div>
  </body>
</html>
