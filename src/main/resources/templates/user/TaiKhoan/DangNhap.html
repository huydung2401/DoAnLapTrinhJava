<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />

    <title>Đăng nhập tài khoản</title>

    <!-- BOOTSTRAP -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    />

    <!-- FONT AWESOME -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/home.css}" />

    <link rel="stylesheet" th:href="@{/css/login.css}" />

    <link rel="stylesheet" th:href="@{/css/footer.css}" />

    <style>
      body {
        background: #f5f5f5;
      }

      .login-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .login-box {
        width: 450px;
        background: white;
        padding: 40px;
        border-radius: 18px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }

      .login-title {
        font-size: 34px;
        font-weight: bold;
        text-align: center;
        margin-bottom: 10px;
        color: #222;
      }

      .login-sub {
        text-align: center;
        color: #777;
        margin-bottom: 30px;
      }

      .form-control {
        height: 50px;
        border-radius: 10px;
      }

      .btn-login {
        width: 100%;
        height: 50px;
        border: none;
        border-radius: 10px;
        background: #006241;
        color: white;
        font-size: 18px;
        font-weight: 600;
        transition: 0.3s;
      }
      .btn-login:hover {
        background: #004d33;
      }
      .login-footer {
        text-align: center;
        margin-top: 20px;
      }

      .login-footer a {
        color: #006241;
        font-weight: 600;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <!-- HEADER -->
    <div th:replace="fragments/header :: header"></div>
    <div class="login-wrapper">
      <div class="login-box">
        <h2 class="login-title">ĐĂNG NHẬP</h2>
        <p class="login-sub">Nhập email và mật khẩu của bạn</p>
        <!-- THÔNG BÁO -->
        <div th:if="${error}" class="alert alert-danger">
          <span th:text="${error}"></span>
        </div>
        <!-- FORM -->
        <form th:action="@{/TaiKhoan/DangNhap}" method="post">
          <!-- EMAIL -->
          <div class="form-group">
            <input
              type="email"
              name="email"
              class="form-control"
              placeholder="Nhập email"
              required
            />
          </div>
          <!-- PASSWORD -->
          <div class="form-group">
            <input
              type="password"
              name="matKhau"
              class="form-control"
              placeholder="Nhập mật khẩu"
              required
            />
          </div>
          <!-- BUTTON -->
          <button type="submit" class="btn-login">ĐĂNG NHẬP</button>
        </form>
        <!-- FOOTER -->
        <div class="login-footer">
          <p>
            Chưa có tài khoản?
            <a th:href="@{/TaiKhoan/DangKy}"> Đăng ký ngay </a>
          </p>
          <p>
            <a href="#"> Quên mật khẩu? </a>
          </p>
        </div>
      </div>
    </div>
    <!-- FOOTER -->
    <div th:replace="fragments/footer :: footer"></div>
  </body>
</html>
