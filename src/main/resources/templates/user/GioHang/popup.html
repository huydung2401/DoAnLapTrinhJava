<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Popup Giỏ Hàng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        .cart-popup{
            width: 350px;
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .cart-header{
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .cart-item{
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            position: relative;
        }

        .cart-item img{
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }

        .qty-box{
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .qty-btn{
            width: 28px;
            height: 28px;
            border-radius: 4px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            text-align: center;
            line-height: 26px;
            font-weight: bold;
        }

        .qty-input{
            width: 40px;
            text-align: center;
        }

        .remove{
            position: absolute;
            right: 0;
            top: 0;
            color: red;
            cursor: pointer;
            font-size: 22px;
        }

        .cart-total{
            font-size: 18px;
            font-weight: bold;
            text-align: right;
            margin-top: 15px;
        }

    </style>

</head>
<body>

<div class="cart-popup">

    <div class="cart-header">
        Giỏ hàng
    </div>

    <!-- GIỎ HÀNG TRỐNG -->

    <div th:if="${gioHang == null or #lists.isEmpty(gioHang.chiTietGioHangs)}">

        <p>Giỏ hàng trống.</p>

        <a th:href="@{/}"
           class="btn btn-primary w-100 mt-3">

            Tiếp tục mua sắm

        </a>

    </div>

    <!-- CÓ SẢN PHẨM -->

    <div th:unless="${gioHang == null or #lists.isEmpty(gioHang.chiTietGioHangs)}">

        <div th:each="item : ${gioHang.chiTietGioHangs}"
             class="cart-item">

            <!-- ẢNH -->

            <img th:src="@{${item.sanPham.hinhAnh}}">

            <!-- THÔNG TIN -->

            <div class="flex-grow-1">

                <strong th:text="${item.sanPham.tenSanPham}">
                </strong>

                <br>

                <span class="text-danger fw-bold"
                      th:text="${#numbers.formatDecimal(item.thanhTien,0,'COMMA',0,'POINT')} + ' đ'">
                </span>

                <!-- SỐ LƯỢNG -->

                <div class="qty-box mt-2">

                    <a th:href="@{/GioHang/Giam/{id}(id=${item.idChiTietGioHang})}"
                       class="qty-btn text-decoration-none">

                        -

                    </a>

                    <input class="qty-input"
                           th:value="${item.soLuong}"
                           disabled>

                    <a th:href="@{/GioHang/Tang/{id}(id=${item.idChiTietGioHang})}"
                       class="qty-btn text-decoration-none">

                        +

                    </a>

                </div>

            </div>

            <!-- XÓA -->

            <a th:href="@{/GioHang/Xoa/{id}(id=${item.idChiTietGioHang})}"
               class="remove text-decoration-none">

                ×

            </a>

        </div>

        <!-- TỔNG -->

        <div class="cart-total">

            Tổng:

            <span th:text="${#numbers.formatDecimal(
                gioHang.chiTietGioHangs.![thanhTien]
                .stream()
                .reduce(0.0, (a,b)->a+b),
                0,
                'COMMA',
                0,
                'POINT')}">
            </span> đ

        </div>

        <!-- BUTTON -->

        <div class="cart-footer mt-3">

            <a th:href="@{/GioHang}"
               class="btn btn-dark w-100">

                Xem giỏ hàng

            </a>

            <a href="#"
               class="btn btn-danger w-100 mt-2">

                Thanh toán

            </a>

        </div>

    </div>

</div>

</body>
</html>
