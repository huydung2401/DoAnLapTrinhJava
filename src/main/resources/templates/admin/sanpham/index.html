<!doctype html>
<html
  lang="vi"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{admin/fragments/admin-layout :: layout('Quản lý Sản Phẩm', ~{::#main-content})}"
>
  <body>
    <div id="main-content">
      <div class="admin-card">
        <div class="card-header">
          <h4 class="card-title">Danh sách Sản Phẩm</h4>
          <a
            th:href="@{/admin/sanpham/create}"
            class="btn-primary-admin text-decoration-none"
          >
            <i class="fas fa-plus"></i> Thêm sản phẩm mới
          </a>
        </div>
        <div class="card-body">
          <!-- Hiển thị thông báo -->
          <div
            th:if="${message}"
            class="alert alert-success alert-dismissible fade show"
          >
            <span th:text="${message}"></span>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="alert"
            ></button>
          </div>
          <div
            th:if="${error}"
            class="alert alert-danger alert-dismissible fade show"
          >
            <span th:text="${error}"></span>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="alert"
            ></button>
          </div>

          <!-- Search & Filter -->
          <form th:action="@{/admin/sanpham}" method="get" class="row mb-4">
            <div class="col-md-4">
              <div class="input-group">
                <input
                  type="text"
                  name="tenSanPham"
                  class="form-control"
                  placeholder="Tìm kiếm theo tên sản phẩm..."
                  th:value="${tenSanPham}"
                />
                <button class="btn btn-outline-secondary" type="submit">
                  <i class="fas fa-search"></i>
                </button>
              </div>
            </div>
            <div class="col-md-3">
              <select
                name="danhMuc"
                class="form-select"
                onchange="this.form.submit()"
              >
                <option value="">-- Tất cả danh mục --</option>
                <option
                  th:each="dm : ${listDM}"
                  th:value="${dm.idDanhMuc}"
                  th:text="${dm.tenDanhMuc}"
                  th:selected="${dm.idDanhMuc == danhMucId}"
                ></option>
              </select>
            </div>
          </form>

          <!-- Table -->
          <div class="table-responsive">
            <table class="table table-hover table-admin">
              <thead>
                <tr>
                  <th width="80">Ảnh</th>
                  <th>Tên Sản Phẩm</th>
                  <th>Danh Mục</th>
                  <th>Giá Gốc</th>
                  <th>Giá KM</th>
                  <th>Tồn Kho</th>
                  <th>Trạng Thái</th>
                  <th width="120" class="text-center">Thao tác</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="item : ${listSP}">
                  <td>
                    <img
                      th:src="@{${item.hinhAnh}}"
                      class="rounded"
                      alt="Ảnh SP"
                      width="50"
                      height="50"
                      style="object-fit: cover"
                    />
                  </td>
                  <td class="fw-bold" th:text="${item.tenSanPham}"></td>
                  <td
                    th:text="${item.danhMuc != null ? item.danhMuc.tenDanhMuc : ''}"
                  ></td>
                  <td
                    th:text="${#numbers.formatDecimal(item.gia, 0, 'COMMA', 0, 'POINT')} + ' đ'"
                  ></td>
                  <td>
                    <span
                      th:if="${item.giaKhuyenMai != null}"
                      class="text-danger fw-bold"
                      th:text="${#numbers.formatDecimal(item.giaKhuyenMai, 0, 'COMMA', 0, 'POINT')} + ' đ'"
                    ></span>
                    <span
                      th:unless="${item.giaKhuyenMai != null}"
                      class="text-muted"
                      >-</span
                    >
                  </td>
                  <td>
                    <span
                      th:if="${item.soLuongTon == 0}"
                      class="text-danger fw-bold"
                      >0</span
                    >
                    <span
                      th:if="${item.soLuongTon > 0}"
                      th:text="${item.soLuongTon}"
                    ></span>
                  </td>
                  <td>
                    <span th:if="${item.trangThai}" class="badge bg-success"
                      >Đang bán</span
                    >
                    <span th:unless="${item.trangThai}" class="badge bg-danger"
                      >Ngừng bán</span
                    >
                  </td>
                  <td class="text-center">
                    <a
                      th:href="@{'/admin/sanpham/edit/' + ${item.idSanPham}}"
                      class="btn btn-sm btn-outline-primary"
                      title="Sửa"
                      ><i class="fas fa-edit"></i
                    ></a>
                    <a
                      th:href="@{'/admin/sanpham/delete/' + ${item.idSanPham}}"
                      class="btn btn-sm btn-outline-danger"
                      title="Xóa"
                      onclick="
                        return confirm(
                          'Bạn có chắc muốn xóa sản phẩm này khỏi cơ sở dữ liệu?',
                        );
                      "
                      ><i class="fas fa-trash"></i
                    ></a>
                  </td>
                </tr>
                <tr th:if="${#lists.isEmpty(listSP)}">
                  <td colspan="8" class="text-center text-muted py-4">
                    Không tìm thấy sản phẩm nào!
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
