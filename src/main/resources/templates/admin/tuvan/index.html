<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin-layout}">
<head>
    <title>Lịch sử yêu cầu tư vấn</title>
</head>
<body>
<div layout:fragment="content" class="container py-5">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold text-primary">
            <i class="fa fa-list-alt"></i> LỊCH SỬ PHIẾU TƯ VẤN </h4>
        
        <a th:href="@{/yeu-cau-tu-van/create}" class="btn btn-warning fw-bold">
            <i class="fa fa-plus-circle"></i> Gửi yêu cầu mới
        </a>
    </div>
    
    <div th:if="${ThongBaoThanhCong}" class="alert alert-success">
        <i class="fa fa-check-circle"></i> <span th:text="${ThongBaoThanhCong}"></span>
    </div>
    
    <div th:if="${listTuVan == null or #lists.isEmpty(listTuVan)}" class="alert alert-info text-center py-4">
        <p class="mb-0">Bạn chưa có phiếu tư vấn nào.</p>
    </div>
    
    <table th:if="${listTuVan != null and !#lists.isEmpty(listTuVan)}"
           class="table table-hover table-bordered bg-white shadow-sm">
        <thead class="table-light">
        <tr>
            <th>Mã phiếu</th>
            <th>Ngày gửi</th>
            <th>Nội dung yêu cầu</th>
            <th>Trạng thái</th>
            <th class="text-center">Hành động</th>
        </tr>
        </thead>
        
        <tbody>
        <tr th:each="item : ${listTuVan}">
            <td>
                <a th:href="@{/yeu-cau-tu-van/details(id=${item.idTuVan})}"
                   class="fw-bold text-decoration-none text-primary">
                    #[(${item.idTuVan})]
                </a>
            </td>
            
            <td th:text="${#temporals.format(item.ngayGui, 'dd/MM/yyyy HH:mm')}"></td>
            
            <td>
                    <span class="text-muted small"
                          th:text="${item.noiDung.length() > 40 ? #strings.substring(item.noiDung, 0, 40) + '...' : item.noiDung}">
                    </span>
            </td>
            
            <td>
                    <span th:classappend="${item.trangThai == 'Đã tư vấn'} ? 'badge bg-success' : 'badge bg-warning text-dark'"
                          th:text="${item.trangThai == 'Đã tư vấn'} ? 'Đã trả lời' : 'Chưa trả lời'">
                    </span>
            </td>
            
            <td class="text-center">
                <a class="btn btn-primary btn-sm" th:href="@{/admin/tuvan/details/{id}(id=${item.idTuVan})}">
                    <i class="fa fa-eye"></i>
                    Xem chi tiết
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
