<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thực Đơn Của Chúng Tôi | Starbucks Theme</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/logIn.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/popup-cart.css}">
    
    <style>
        /* Nền sáng dịu mắt cho các khối */
        .bg-light-green {
            background-color: #F4F7F6;
        }
        
        /* MÀU NHẤN MẠNH (ACCENT) - Xanh lá sáng */
        .text-accent {
            color: #00B14F !important;
        }
        
        /* MÀU CHỦ ĐẠO (MAIN) - Xanh lá đậm */
        .text-main {
            color: #006241 !important;
        }
        
        /* Định dạng Nút bấm */
        .btn-main {
            background-color: #006241 !important;
            color: white !important;
            transition: all 0.3s;
            border: none;
        }
        
        .btn-main:hover {
            background-color: #00B14F !important; /* Đổi sang xanh sáng khi hover */
            color: white !important;
        }
        
        /* Menu Danh mục bên trái */
        .category-list .list-group-item {
            background-color: transparent;
            border: none;
            padding: 12px 20px;
            color: #006241;
            font-weight: 500;
            transition: all 0.2s;
            border-radius: 8px;
            margin-bottom: 5px;
        }
        
        .category-list .list-group-item:hover {
            background-color: #E8F5E9;
            color: #00B14F;
            cursor: pointer;
            text-decoration: none;
        }
        
        .category-list .list-group-item.active {
            background-color: #006241;
            color: white;
            border-color: #006241;
        }
        
        /* Định dạng phân trang */
        .pagination .page-link {
            color: #006241;
            border-color: #C8E6C9;
            margin: 0 4px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .pagination .page-item.active .page-link {
            background-color: #006241;
            border-color: #006241;
            color: white;
        }
        
        .pagination .page-link:hover {
            background-color: #00B14F;
            color: white;
            border-color: #00B14F;
        }
        
        /* Hiệu ứng nảy lên cho card */
        .hover-card {
            transition: all 0.3s ease-in-out;
        }
        
        .hover-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0.5rem 1rem rgba(0, 98, 65, 0.15) !important;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<!-- FLASH MESSAGES -->
<div class="container mt-3" style="position: absolute; z-index: 9999; left: 0; right: 0;">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="fas fa-check-circle mr-2"></i> <span th:text="${success}"></span>
        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
            <span aria-hidden="true">&times;</span>
        </button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="fas fa-exclamation-circle mr-2"></i> <span th:text="${error}"></span>
        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
            <span aria-hidden="true">&times;</span>
        </button>
    </div>
</div>

<div class="container-fluid position-relative py-5 mb-5 border-bottom" style="
        min-height: 250px;
        display: flex;
        align-items: center;
        background-image: url('https://images.pexels.com/photos/333525/pexels-photo-333525.jpeg?auto=compress&cs=tinysrgb&w=1600');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;">
    
    <div class="position-absolute top-0 left-0 w-100 h-100"
         style="background-color: rgba(0, 98, 65, 0.8); position: absolute; top: 0; left: 0;"></div>
    
    <div class="container position-relative px-lg-5 text-center" style="z-index: 1;">
        <h1 class="display-4 fw-bold text-white mb-2"
            style="text-shadow: 2px 2px 4px rgba(0,0,0,0.5); font-weight: bold;">Thực Đơn Của Chúng Tôi</h1>
        <hr class="mx-auto my-3" style="width: 60px; border-top: 3px solid #00B14F; opacity: 1;">
        <p class="text-white-50 mb-4 font-weight-normal"
           style="font-size: 1.25rem; color: rgba(255,255,255,0.7) !important;">Khám phá thế giới đồ uống đầy hương vị được pha chế bằng cả sự tận tâm.</p>
    </div>
</div>

<div class="container-fluid px-lg-5 mb-5">
    <div class="row">
        
        <div class="col-lg-3 col-xl-2 mb-4 mb-lg-0">
            <div class="bg-light-green rounded p-4 shadow-sm border"
                 style="border-color: #C8E6C9 !important; position: sticky; top: 100px; z-index: 10;">
                <h5 class="fw-bold text-main mb-4 border-bottom pb-2 font-weight-bold">Danh Mục</h5>
                <div class="list-group category-list">
                    <a th:href="@{/menu}" class="list-group-item"
                       th:classappend="${currentCategoryId == null ? 'active' : ''}">Tất cả đồ uống</a>
                    <th:block th:each="cat : ${danhMucList}">
                        <a th:href="@{/menu(categoryId=${cat.idDanhMuc})}" class="list-group-item"
                           th:classappend="${currentCategoryId == cat.idDanhMuc ? 'active' : ''}"
                           th:text="${cat.tenDanhMuc}">Cà Phê Truyền Thống</a>
                    </th:block>
                </div>
            </div>
        </div>
        
        <div class="col-lg-9 col-xl-10">
            
            <div class="d-flex justify-content-end mb-3">
                
                <form method="get" th:action="@{/menu}" class="form-inline">
                    
                    <input type="hidden" name="categoryId" th:value="${currentCategoryId}">
                    
                    <input type="hidden" name="keyword" th:value="${currentKeyword}">
                    
                    <label class="mr-2 text-main fw-bold mb-0">
                        Sắp xếp:
                    </label>
                    
                    <select name="sort" class="form-control form-control-sm border-0 bg-white shadow-sm"
                            onchange="this.form.submit()">
                        
                        <option value="new" th:selected="${sort == 'new'}">
                            Mới nhất
                        </option>
                        
                        <option value="price-asc" th:selected="${sort == 'price-asc'}">
                            Giá: Thấp đến Cao
                        </option>
                        
                        <option value="price-desc" th:selected="${sort == 'price-desc'}">
                            Giá: Cao xuống Thấp
                        </option>
                        
                        <option value="name-asc" th:selected="${sort == 'name-asc'}">
                            Tên: A - Z
                        </option>
                    
                    </select>
                
                </form>
            
            </div>
            
            <div class="row">
                <th:block th:each="sp : ${sanPhamList}">
                    <div class="col-sm-6 col-md-4 col-xl-3 mb-4">
                        <div class="card border-0 bg-white shadow-sm hover-card rounded h-100 overflow-hidden position-relative">
                            <div class="position-absolute top-0 left-0 m-2 d-flex flex-column"
                                 style="z-index: 1; gap: 4px;">
                                <span class="bg-danger text-white px-2 py-1 rounded fw-bold shadow-sm"
                                      style="font-size: 0.8rem;" th:if="${sp.laBanChay}">Bán chạy</span>
                                <span class="bg-warning text-dark px-2 py-1 rounded fw-bold shadow-sm"
                                      style="font-size: 0.8rem;" th:if="${sp.laNoiBat}">Nổi bật</span>
                                <span class="bg-info text-white px-2 py-1 rounded fw-bold shadow-sm"
                                      style="font-size: 0.8rem;" th:if="${sp.laSanPhamMoi}">Mới</span>
                            </div>
                            <a th:href="@{/detail(id=${sp.idSanPham})}">
                                <img th:src="${sp.hinhAnh}" class="card-img-top" th:alt="${sp.tenSanPham}"
                                     style="height: 250px; object-fit: cover; cursor: pointer;">
                            </a>
                            <div class="card-body d-flex flex-column p-4">
                                <h5 class="card-title fw-bold mb-2 font-weight-bold">
                                    
                                    <a th:href="@{/detail(id=${sp.idSanPham})}" class="text-main text-decoration-none"
                                       th:text="${sp.tenSanPham}">
                                        Trà Sữa Trân Châu
                                    </a>
                                </h5>
                                <p class="card-text text-muted small mb-3"
                                   th:text="${sp.moTaNgan}">Hồng trà nướng đượm vị kết hợp trân châu dai giòn.</p>
                                <div class="mt-auto d-flex justify-content-between align-items-center">
                                    <span class="h5 font-weight-bold text-accent mb-0"
                                          th:text="${#numbers.formatDecimal(sp.gia, 0, 'COMMA', 0, 'POINT')} + 'đ'">35.000đ</span>
                                    <a th:href="@{/detail(id=${sp.idSanPham})}"
                                       class="btn btn-main btn-sm px-3 rounded-pill font-weight-bold">+ Thêm</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </th:block>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
