<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title layout:title-pattern="$CONTENT_TITLE - Admin Panel">Admin Panel</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    
    <style>
        :root {
            --primary: #1e293b;
            --secondary: #0f172a;
            --accent: #3b82f6;
            --bg: #f1f5f9;
            --white: #ffffff;
        }
        
        body {
            background-color: var(--bg);
            font-family: 'Segoe UI', sans-serif;
        }
        
        /* ===== SIDEBAR ===== */
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(180deg, var(--secondary), var(--primary));
            color: var(--white);
            padding-top: 20px;
            position: sticky;
            top: 0;
        }
        
        .brand-logo {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }
        
        .brand-logo i {
            color: var(--accent);
            margin-right: 8px;
        }
        
        .sidebar nav a {
            display: flex;
            align-items: center;
            padding: 11px 22px;
            color: #e5e7eb;
            text-decoration: none;
            font-size: 14px;
            border-left: 4px solid transparent;
            transition: all .2s ease;
        }
        
        .sidebar nav a i {
            width: 22px;
            margin-right: 12px;
            text-align: center;
        }
        
        .sidebar nav a:hover, .sidebar nav a.active {
            background: rgba(255, 255, 255, 0.13);
            color: var(--white);
            border-left-color: var(--accent);
        }
        
        .menu-title {
            font-size: 10px;
            letter-spacing: 1.2px;
            padding: 12px 22px 4px;
            margin-top: 8px;
            color: #64748b;
            text-transform: uppercase;
        }
        
        /* ===== TOPBAR ===== */
        .topbar {
            background: var(--white);
            padding: 14px 24px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            margin-bottom: 24px;
        }
        
        .topbar h4 {
            margin: 0;
            font-weight: 700;
            color: var(--primary);
            font-size: 18px;
        }
        
        .admin-info {
            font-weight: 600;
            color: var(--primary);
            font-size: 14px;
        }
        
        .main-content {
            padding: 28px 30px;
        }
    </style>
</head>

<body>
<div class="container-fluid">
    <div class="row flex-nowrap">
        
        <div class="col-md-3 col-lg-2 sidebar p-0">
            <div class="brand-logo">
                <i class="fa fa-store"></i> ADMIN
            </div>
            
            <nav>
                <a th:href="@{/admin/dashboard}" th:classappend="${currentUrl.contains('/dashboard')} ? 'active'">
                    <i class="fa fa-chart-pie"></i> Tổng quan
                </a>
                
                <div class="menu-title">Sản phẩm</div>
                <a th:href="@{/admin/sanpham}" th:classappend="${currentUrl.contains('/sanpham')} ? 'active'">
                    <i class="fa fa-boxes"></i> Kho sản phẩm
                </a>
                <a th:href="@{/admin/nhapkho/create}"
                   th:classappend="${currentUrl.contains('/nhapkho/create')} ? 'active'">
                    <i class="fa fa-download"></i> Nhập kho
                </a>
                <a th:href="@{/admin/nhapkho}"
                   th:classappend="${currentUrl.contains('/nhapkho') && !currentUrl.contains('/create')} ? 'active'">
                    <i class="fa fa-clock-rotate-left"></i> Lịch sử nhập kho
                </a>
                <a th:href="@{/admin/khuyenmai}"
                   th:classappend="${currentUrl != null && currentUrl.contains('/admin/khuyenmai')} ? 'active'">
                    <i class="fa fa-tags"></i> Khuyến mãi
                </a>
                <a th:href="@{/admin/danhgia}" th:classappend="${currentUrl.contains('/danhgia')} ? 'active'">
                    <i class="fa fa-star"></i> Đánh giá
                </a>
                
                <div class="menu-title">Khách hàng</div>
                <a th:href="@{/admin/khachhang}" th:classappend="${currentUrl.contains('/khachhang')} ? 'active'">
                    <i class="fa fa-users"></i> Khách hàng
                </a>
                <a th:href="@{/admin/donhang}" th:classappend="${currentUrl.contains('/donhang')} ? 'active'">
                    <i class="fa fa-file-invoice"></i> Đơn hàng
                </a>
                <a th:href="@{/admin/tuvan}"
                   th:classappend="${currentUrl != null && currentUrl.contains('/tuvan')} ? 'active'">
                    <i class="fa fa-comments"></i> Tư vấn
                </a>
                
                <div class="menu-title">Hệ thống</div>
                <a th:href="@{/admin/doanhthu}" th:classappend="${currentUrl.contains('/doanhthu')} ? 'active'">
                    <i class="fa fa-chart-line"></i> Doanh thu
                </a>
                <a href="#">
                    <i class="fa fa-user-shield"></i> Nhân viên
                </a>
                
                <hr style="border-color:rgba(255,255,255,0.1); margin:8px 16px;"/>
                <a th:href="@{/TaiKhoan/DangXuat}" class="text-danger"
                   onclick="return confirm('Bạn có chắc muốn đăng xuất không?');">
                    <i class="fa fa-sign-out-alt"></i>
                    Đăng xuất
                </a>
            </nav>
        </div>
        
        <div class="col main-content">
            <div class="topbar d-flex justify-content-between align-items-center">
                <h4 th:text="${title} ?: 'Bảng Điều Khiển'">Tiêu đề trang</h4>
                <div class="admin-info">
                    <i class="fa fa-user-circle me-2"></i>
                    Xin chào,
                    <span th:text="${session.adminTen} ?: 'Admin'">Admin</span>
                </div>
            </div>
            
            <div layout:fragment="content"></div>
        </div>
    </div>
</div>
<th:block layout:fragment="script"></th:block>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
