<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />

    <title>Gửi yêu cầu tư vấn nội thất</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/home.css}" />

    <link rel="stylesheet" th:href="@{/css/login.css}" />

    <link rel="stylesheet" th:href="@{/css/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/popup-cart.css}" />
  </head>

  <body>
    <!-- HEADER -->
    <div th:replace="fragments/header :: header"></div>

    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card shadow border-0">
            <div class="card-header bg-primary text-white text-center">
              <h4 class="fw-bold mb-0">
                <i class="fa fa-headset"></i>

                GỬI YÊU CẦU TƯ VẤN NỘI THẤT
              </h4>

              <small> Thông tin cá nhân đã được điền tự động. </small>
            </div>

            <div class="card-body p-4">
              <form
                th:action="@{/TuVan/Create}"
                th:object="${tuVan}"
                method="post"
              >
                <!-- HỌ TÊN -->

                <div class="mb-3">
                  <label>Họ và tên</label>

                  <input
                    type="text"
                    class="form-control"
                    th:value="${session.User.hoTen}"
                    readonly
                  />
                </div>

                <!-- ĐIỆN THOẠI -->

                <div class="mb-3">
                  <label>Số điện thoại</label>

                  <input
                    type="text"
                    class="form-control"
                    th:value="${session.User.soDienThoai}"
                    readonly
                  />
                </div>

                <!-- EMAIL -->

                <div class="mb-3">
                  <label>Email</label>

                  <input
                    type="text"
                    class="form-control"
                    th:value="${session.User.email}"
                    readonly
                  />
                </div>

                <!-- NỘI DUNG -->

                <div class="mb-3">
                  <label>Nội dung cần tư vấn</label>

                  <textarea
                    th:field="*{noiDung}"
                    class="form-control"
                    rows="5"
                  ></textarea>
                </div>

                <button type="submit" class="btn btn-primary">
                  Gửi yêu cầu
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- FOOTER -->
    <div th:replace="fragments/footer :: footer"></div>
  </body>
</html>
