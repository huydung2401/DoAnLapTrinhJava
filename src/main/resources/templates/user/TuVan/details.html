<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết tư vấn</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet"
          th:href="@{/css/home.css}">

    <link rel="stylesheet"
          th:href="@{/css/login.css}">

    <link rel="stylesheet"
          th:href="@{/css/footer.css}">

</head>
<body>
<!-- HEADER -->
<div th:replace="fragments/header :: header"></div>

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h4 class="fw-bold text-primary">

            <i class="fa fa-envelope-open-text"></i>

            CHI TIẾT PHIẾU TƯ VẤN
            #<span th:text="${phieu.idTuVan}"></span>

        </h4>

        <a th:href="@{/TuVan}"
           class="btn btn-secondary">

            <i class="fa fa-arrow-left"></i>
            Quay lại

        </a>

    </div>

    <div class="row">

        <!-- THÔNG TIN -->

        <div class="col-md-5">

            <div class="card bg-light h-100">

                <div class="card-header fw-bold">

                    <i class="fa fa-info-circle"></i>
                    THÔNG TIN KHÁCH HÀNG

                </div>

                <div class="card-body">

                    <p>

                        <strong>Ngày gửi:</strong>

                        <span th:text="${#temporals.format(phieu.ngayGui,'dd/MM/yyyy HH:mm')}">
                        </span>

                    </p>

                    <hr>

                    <ul class="list-group">

                        <li class="list-group-item">

                            <small class="text-muted">
                                Họ và tên:
                            </small>

                            <div class="fw-bold"
                                 th:text="${phieu.user != null ? phieu.user.hoTen : 'Không có dữ liệu'}">
                            </div>

                        </li>

                        <li class="list-group-item">

                            <small class="text-muted">
                                Nội dung yêu cầu:
                            </small>

                            <div class="fw-bold text-primary"
                                 style="white-space: pre-line"
                                 th:text="${phieu.noiDung}">
                            </div>

                        </li>

                    </ul>

                </div>

            </div>

        </div>

        <!-- PHẢN HỒI -->

        <div class="col-md-7">

            <div class="card shadow h-100">

                <div class="card-header bg-primary text-white fw-bold">

                    <i class="fa fa-user-tie"></i>
                    PHẢN HỒI TỪ CHUYÊN VIÊN

                </div>

                <div class="card-body">

                    <div th:if="${phieu.trangThai == 'DA_PHAN_HOI'}">

                        <div class="alert alert-light border border-primary">

                            <label class="fw-bold text-primary">

                                Nội dung tư vấn:

                            </label>

                            <div style="font-size: 1.1rem;
                                        white-space: pre-line"
                                 th:text="${phieu.phanHoiAdmin}">
                            </div>

                        </div>

                    </div>

                    <div th:if="${phieu.trangThai != 'DA_PHAN_HOI'}">

                        <div class="alert alert-warning text-center">

                            <i class="fa fa-clock"></i>

                            Chuyên viên chưa phản hồi phiếu tư vấn này.

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>
<!-- FOOTER -->
<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
