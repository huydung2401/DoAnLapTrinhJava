<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán đơn hàng - Coffee MOHO</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
        body {
            background: #f8f9fa;
            font-family: 'Quicksand', sans-serif;
        }
        
        .payment-card {
            background: #fff;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            margin: 50px auto;
            text-align: center;
        }
        
        .qr-img {
            border: 2px solid #eee;
            border-radius: 10px;
            padding: 10px;
            width: 100%;
        }
        
        .status-badge {
            background: #fff3cd;
            color: #856404;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            display: inline-block;
            margin-top: 20px;
        }
        
        .spinner-border {
            width: 1.5rem;
            height: 1.5rem;
            vertical-align: middle;
            margin-right: 10px;
        }
    </style>
</head>
<body>

<div class="payment-card">
    <h4 class="font-weight-bold">Thanh toán QR</h4>
    <p class="text-muted">Vui lòng mở App Ngân hàng để quét mã</p>
    
    <img th:src="${qrUrl}" class="qr-img" alt="QR Code"/>
    
    <div class="mt-3">
        <p class="mb-1">Số tiền: <strong class="text-danger"
                                         th:text="${#numbers.formatInteger(donHang.tongTien, 0, 'POINT')} + '₫'"></strong>
        </p>
        <p>Nội dung: <strong class="text-primary" th:text="'DH' + ${donHang.idDonHang}"></strong></p>
    </div>
    
    <div id="statusWrapper" class="status-badge">
        <div class="spinner-border spinner-border-sm" role="status"></div>
        <span id="statusMsg">Đang đợi thanh toán...</span>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    var idDonHang = /*[[${donHang.idDonHang}]]*/ 0;
    
    // Kiểm tra trạng thái mỗi 2 giây
    var checkInterval = setInterval(function () {
        fetch('/api/check-status/' + idDonHang)
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'DA_THANH_TOAN') {
                        clearInterval(checkInterval);
                        
                        // Giao diện khi thành công
                        document.getElementById('statusWrapper').className = "badge badge-success p-3";
                        document.getElementById('statusMsg').innerText = "Thanh toán thành công!";
                        
                        // Delay 1s để người dùng kịp nhìn thấy thông báo thành công
                        setTimeout(function () {
                            window.location.href = '/DonHang/XemHoaDon/' + idDonHang;
                        }, 1000);
                    }
                })
                .catch(err => console.log('Đang kết nối...'));
    }, 2000);
    /*]]>*/
</script>
</body>
</html>
